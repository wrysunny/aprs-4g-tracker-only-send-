;    AIR820-TRACKER
;    基于 bg4uvr/4G-Tracker 改进的 APRS Tracker

;    ----》 以下为"必设"配置项 《----
CALLSIGN        =   BA4TGG
PASSCODE        =   17072

;    ----》 以下为"选设"配置项 《----
SSID            =   7
TABLE           =   /
SYMBOL          =   >
SERVER          =   china.aprs2.net
PORT            =   14580
BEACON          =   4G APRS Tracker
BEACON_INTERVAL =   60          ; 状态信标间隔，单位分钟，0 表示关闭

;    ----》 以下为 Tracker 扩展配置 《----
PATH            =   TCPIP*
COMMENT         =   4G APRS Tracker
ADD_VOLTAGE     =   true        ; 是否在帧中附加电压/温度遥测

;    SmartBeacon 参数
SMART_FAST      =   60          ; 高速阈值（节）
SMART_SLOW      =   5           ; 低速阈值（节）
SMART_TURN      =   28          ; 触发补发的航向变化量（度）
BEACON_FAST     =   10          ; 高速时发送间隔（秒）
BEACON_SLOW     =   50          ; 低速/停止时发送间隔（秒）
